<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1810"/>
      <stop offset="55%" stop-color="#12130d"/>
      <stop offset="100%" stop-color="#0a0e0b"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fbe6ab"/>
      <stop offset="55%" stop-color="#e7b24c"/>
      <stop offset="100%" stop-color="#c8902f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e7b24c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e7b24c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7fe6e0"/>
      <stop offset="50%" stop-color="#2f9d92"/>
      <stop offset="100%" stop-color="#0c3b3a"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="240" r="220" fill="url(#glow)"/>

  <!-- sun -->
  <circle cx="256" cy="210" r="92" fill="url(#sun)"/>

  <!-- teal spring -->
  <ellipse cx="256" cy="392" rx="150" ry="34" fill="url(#pool)"/>
  <ellipse cx="256" cy="382" rx="150" ry="22" fill="#cffaf3" opacity="0.22"/>

  <!-- oasis bed -->
  <path d="M150 396 Q256 352 362 396 Q256 420 150 396 Z" fill="#3f8a5b"/>

  <!-- palm -->
  <g stroke-linecap="round" fill="none">
    <path d="M256 392 q10 -120 2 -210" stroke="#6b4a2a" stroke-width="14"/>
    <path d="M258 182 q -70 -28 -118 6" stroke="#5aa469" stroke-width="11"/>
    <path d="M258 182 q -50 -42 -104 -40" stroke="#5aa469" stroke-width="11"/>
    <path d="M258 182 q 70 -28 118 6" stroke="#5aa469" stroke-width="11"/>
    <path d="M258 182 q 50 -42 104 -40" stroke="#5aa469" stroke-width="11"/>
    <path d="M258 182 q -8 -34 0 -64" stroke="#5aa469" stroke-width="11"/>
  </g>
  <circle cx="258" cy="182" r="9" fill="#3f8a5b"/>
</svg>
