<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#123a2c"/>
      <stop offset="60%" stop-color="#0c281f"/>
      <stop offset="100%" stop-color="#06120d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3cf"/>
      <stop offset="38%" stop-color="#f6d488"/>
      <stop offset="70%" stop-color="#e0b251"/>
      <stop offset="100%" stop-color="#b07d2c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fff5da"/>
      <stop offset="55%" stop-color="#f6d488"/>
      <stop offset="100%" stop-color="#cf9c3c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#f6d488" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f6d488" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="214" r="180" fill="url(#glow)"/>

  <!-- crest rings -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.95"/>
  <circle cx="256" cy="256" r="214" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.4"/>

  <!-- sun disc -->
  <circle cx="256" cy="206" r="44" fill="url(#sun)"/>
  <circle cx="256" cy="206" r="52" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.5"/>

  <!-- refined palm: thin gold linework -->
  <g fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round">
    <path d="M256 372 C 252 320 250 286 252 250"/>
  </g>
  <g fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round">
    <path d="M252 250 C 214 232 182 232 150 248"/>
    <path d="M252 250 C 226 220 200 206 168 204"/>
    <path d="M252 250 C 244 218 240 196 244 168"/>
    <path d="M252 250 C 290 232 322 232 354 248"/>
    <path d="M252 250 C 278 220 304 206 336 204"/>
    <path d="M252 250 C 262 220 270 200 286 176"/>
  </g>
  <circle cx="252" cy="250" r="6" fill="url(#gold)"/>

  <!-- oasis water line + faint reflection -->
  <g stroke="url(#gold)" stroke-linecap="round" fill="none">
    <path d="M150 372 H 224 M 288 372 H 362" stroke-width="5"/>
    <path d="M176 388 H 230 M 282 388 H 336" stroke-width="2.5" opacity="0.45"/>
  </g>
</svg>
