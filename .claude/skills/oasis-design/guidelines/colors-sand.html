<!-- @dsCard group="Colors" viewport="700x150" name="Sand — neutral spine" subtitle="Warm tan → near-black brown. The system's neutrals (never grey)." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #100a06; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(247,239,223,0.06); }
  .n { font-size: 10px; color: var(--text-secondary); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .h { font-size: 9px; color: var(--text-faint); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row" id="row"></div>
  </div>
  <script>
    const steps = ['50','100','200','300','400','500','600','700','800','900','950'];
    document.getElementById('row').innerHTML = steps.map(s => {
      const v = getComputedStyle(document.documentElement).getPropertyValue('--sand-'+s).trim();
      return `<div class="sw"><div class="chip" style="background:${v}"></div><span class="n">${s}</span><span class="h">${v}</span></div>`;
    }).join('');
  </script>
</body>
</html>
