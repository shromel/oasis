<!-- @dsCard group="Colors" viewport="700x150" name="Cavern depths & dusk" subtitle="Wailing-Caverns greens, bioluminescent glow, terracotta dusk." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #08100c; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: 11px; border: 1px solid rgba(247,239,223,0.06); }
  .name { font-size: 10px; margin-top: 7px; color: var(--text-secondary); }
  .h { font-size: 9px; color: var(--text-faint); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--cavern-moss)"></div><span class="name">moss</span><span class="h">#6f8f3f</span></div>
    <div class="sw"><div class="chip" style="background:var(--cavern-fern)"></div><span class="name">fern</span><span class="h">#3f7a4a</span></div>
    <div class="sw"><div class="chip" style="background:var(--cavern-glow)"></div><span class="name">glow</span><span class="h">#7ff0c0</span></div>
    <div class="sw"><div class="chip" style="background:var(--cavern-pool)"></div><span class="name">pool</span><span class="h">#1c6f68</span></div>
    <div class="sw"><div class="chip" style="background:var(--cavern-deep)"></div><span class="name">deep</span><span class="h">#0c3b3a</span></div>
    <div class="sw"><div class="chip" style="background:var(--dusk-rose)"></div><span class="name">dusk-rose</span><span class="h">#d98a6a</span></div>
  </div>
</body>
</html>
