<!-- @dsCard group="Type" viewport="700x190" name="Display — Fraunces" subtitle="Optical serif. Headings & big numerals, set tight with negative tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0c1410; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 4px; }
  .heading { margin: 0; }
  .d1 { font-size: 2.6rem; line-height: 1; letter-spacing: -0.02em; }
  .d2 { font-size: 1.875rem; letter-spacing: -0.02em; }
  .d3 { font-size: 1.25rem; }
  .meta { font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="heading d1">Watch the numbers climb<span style="opacity:.4">.</span></p>
    <p class="heading d2">Path to Level 2</p>
    <p class="heading d3">Current bests</p>
    <p class="meta">Fraunces · 700 / 600 / 500 · optical sizing auto · tracking −0.02em</p>
  </div>
</body>
</html>
