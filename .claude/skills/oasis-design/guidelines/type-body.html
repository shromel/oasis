<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0c1410; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 9px; max-width: 560px; }
  p { margin: 0; }
  .lg { font-size: 1.0625rem; color: var(--text-primary); font-weight: 500; }
  .base { font-size: 0.95rem; color: var(--text-body); line-height: 1.55; }
  .sec { font-size: 0.875rem; color: var(--text-secondary); }
  .muted { font-size: 0.75rem; color: var(--text-muted); }
  .meta { font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lg">Your program, imported and ready.</p>
    <p class="base">Training grows the oasis; nutrition keeps it alive. Everything lives on this device — export a backup to move between phone and Mac.</p>
    <p class="sec">Advance when you hit the exit criteria.</p>
    <p class="muted">made for the long climb</p>
    <p class="meta">Inter · 400 / 500 / 600 / 700 · body 15px / 1.55</p>
  </div>
</body>
</html>
