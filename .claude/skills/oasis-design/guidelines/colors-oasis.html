<!-- @dsCard group="Colors" viewport="700x150" name="Oasis — living water & growth" subtitle="Sage, palm, teal, turquoise. Success, growth, info." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0a130f; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 72px; border-radius: 12px; border: 1px solid rgba(247,239,223,0.06); }
  .name { font-size: 12px; margin-top: 8px; color: var(--text-secondary); }
  .h { font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--oasis-green)"></div><span class="name">green</span><span class="h">#3f8a5b</span></div>
    <div class="sw"><div class="chip" style="background:var(--oasis-palm)"></div><span class="name">palm · success</span><span class="h">#5aa469</span></div>
    <div class="sw"><div class="chip" style="background:var(--oasis-teal)"></div><span class="name">teal</span><span class="h">#2f7d72</span></div>
    <div class="sw"><div class="chip" style="background:var(--oasis-water)"></div><span class="name">water · info</span><span class="h">#4cc4d4</span></div>
  </div>
</body>
</html>
