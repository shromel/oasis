<!-- @dsCard group="Brand" viewport="700x200" name="Logo mark" subtitle="The Oasis app icon — a golden cavern-oasis with waterfall, palms & parrot." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0a130f; font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 26px 28px; display: flex; align-items: center; gap: 32px; }
  .mark { width: 96px; height: 96px; border-radius: 22px; overflow: hidden; box-shadow: var(--shadow-card); flex: 0 0 auto; }
  .mark img { width: 100%; height: 100%; display: block; }
  .lockup { display: flex; flex-direction: column; gap: 6px; }
  .name { font-family: var(--font-display); font-size: 2rem; letter-spacing: -0.02em; color: var(--text-primary); }
  .tag { font-size: 0.875rem; color: var(--text-secondary); }
  .meta { font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><img src="../assets/logo-mark.png" alt="Oasis"></div>
    <div class="lockup">
      <span class="name"><span class="gold-text">Oasis</span></span>
      <span class="tag">Train &amp; nourish — the long climb.</span>
      <span class="meta">assets/logo-mark.png · app-icon.png (512)</span>
    </div>
  </div>
</body>
</html>
