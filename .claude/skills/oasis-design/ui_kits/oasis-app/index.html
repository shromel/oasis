<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis — App UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(231,178,76,0.08), transparent 50%),
      #07100c;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 16px;
    box-sizing: border-box;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script type="text/babel" src="kit.jsx" data-presets="react"></script>
  <script type="text/babel" src="Trajectory.jsx" data-presets="react"></script>
  <script type="text/babel" src="ScreensA.jsx" data-presets="react"></script>
  <script type="text/babel" src="ScreensB.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const [tab, setTab] = React.useState('home');
      const [logging, setLogging] = React.useState(false);

      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

      const start = () => setLogging(true);
      let screen;
      if (tab === 'home') screen = <HomeScreen onStart={start} />;
      else if (tab === 'train') screen = <TrainScreen onStart={start} />;
      else if (tab === 'progress') screen = <ProgressScreen />;
      else if (tab === 'nourish') screen = <NourishScreen />;
      else screen = <YouScreen />;

      return (
        <PhoneFrame>
          <StatusBar />
          {screen}
          <BottomNav active={tab} onNav={setTab} />
          {logging && <SessionLogger onClose={() => setLogging(false)} />}
        </PhoneFrame>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
